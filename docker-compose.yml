services:
  db:
    profiles: ['standalone', 'docker']
    image: postgis/postgis:16-3.4-alpine
    container_name: geo-dashboard-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geo_dashboard
    volumes:
      - geo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Scraper: run once on demand ─────────────────────────────────────────────
  # Usage:
  #   docker compose --profile scraping run --rm scraper
  #   docker compose --profile scraping run --rm scraper --source airbnb --max 50
  #   docker compose --profile scraping run --rm scraper --source facebook-events --dry-run
  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    profiles: ['scraping']
    restart: 'no'
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/geo_dashboard
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      # Mount cookies file (created by: pnpm run scrape:cookies)
      - ./scripts/scraping/.fb-cookies.json:/app/scripts/scraping/.fb-cookies.json:ro

  # ── Scraper: resumable backfill + six-hour incremental collection ──────────
  # Start with: pnpm scrape:up  (or: docker compose --profile docker up -d scraper-cron)
  # Uses the shared Compose network to reach the local GeoLocal database.
  # Backfill advances every 20 minutes; incremental checks additions every 6 hours.
  # Logs: pnpm scrape:logs  |  Stop: pnpm scrape:down
  scraper-cron:
    profiles: ['docker']
    build:
      context: .
      dockerfile: Dockerfile.scraper
    restart: unless-stopped
    env_file:
      # Single source of truth for shared provider creds (MINIMAX_*, etc.).
      # `required: false` keeps things working in app-only clones.
      - path: ../../.env
        required: false
    environment:
      # Override for external databases; the local default uses the shared Compose network.
      DATABASE_URL: ${SCRAPER_DATABASE_URL:-postgresql://postgres:postgres@geo-dashboard-db:5432/geo_dashboard}
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      SCRAPE_SCHEDULE: 'true'
      SCRAPE_BACKFILL_INTERVAL_MINUTES: '${SCRAPE_BACKFILL_INTERVAL_MINUTES:-20}'
      SCRAPE_INCREMENTAL_INTERVAL_HOURS: '${SCRAPE_INCREMENTAL_INTERVAL_HOURS:-6}'
      SCRAPE_INCREMENTAL_MAX_BATCHES: '${SCRAPE_INCREMENTAL_MAX_BATCHES:-5}'
      SCRAPE_BATCH_SIZE: '${SCRAPE_BATCH_SIZE:-100}'
      SCRAPE_SKIP_AI: '${SCRAPE_SKIP_AI:-true}'
      SCRAPER_CONTACT_URL: '${SCRAPER_CONTACT_URL:-http://localhost:3003/about}'
      # AI normaliser — optional per-app override of the workspace MINIMAX_*
      # defaults loaded via env_file above. Leave empty to use the workspace
      # default. See src/shared/lib/ai/config.ts for resolution order.
      AI_SCRAPER_BASE_URL: ${AI_SCRAPER_BASE_URL:-}
      AI_SCRAPER_API_KEY: ${AI_SCRAPER_API_KEY:-}
      AI_SCRAPER_MODEL: ${AI_SCRAPER_MODEL:-}
      AI_SCRAPER_TIMEOUT_MS: ${AI_SCRAPER_TIMEOUT_MS:-30000}
      AI_SCRAPER_MAX_RETRIES: ${AI_SCRAPER_MAX_RETRIES:-2}
    volumes:
      - ./scripts/scraping/.fb-cookies.json:/app/scripts/scraping/.fb-cookies.json:ro

volumes:
  geo_db_data:
